version: 2

project_name: chezmoui

before:
  hooks:
  - go mod tidy

builds:
- id: cmui
  main: ./cmd/cmui
  binary: cmui
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  - darwin
  - windows
  goarch:
  - amd64
  - arm64
  ignore:
  - goos: windows
    goarch: arm64
  flags:
  - -trimpath
  ldflags:
  - -s -w
  - -X main.version={{.Version}}
  - -X main.commit={{.Commit}}
  - -X main.date={{.Date}}

archives:
- id: cmui
  name_template: >-
    {{- .ProjectName }}_ {{- .Version }}_ {{- .Os }}_ {{- if eq .Arch "amd64" }}x86_64 {{- else if eq .Arch "386" }}i386 {{- else }}{{ .Arch }}{{ end }}
  formats: [ tar.gz ]
  format_overrides:
  - goos: windows
    formats: [ zip ]
  files:
  - LICENSE*
  - README*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
    - "^docs:"
    - "^chore:"
    - "^test:"
    - "^ci:"
    - "Merge pull request"
    - "Merge branch"

release:
  github:
    owner: balintb
    name: chezmoui
  draft: false
  prerelease: auto
  header: |
    ## cmui {{ .Tag }}

    A TUI for [chezmoi](https://www.chezmoi.io/).
  footer: |
    ---
    Install via Homebrew: `brew install balintb/tap/chezmoui`
    Install via Go: `go install github.com/balintb/chezmoui/cmd/cmui@{{ .Tag }}`

brews:
  - name: chezmoui
    repository:
      owner: balintb
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/balintb/chezmoui"
    description: "A TUI for chezmoi."
    license: MIT
    dependencies:
      - name: chezmoi
    install: |
      bin.install "cmui"
    test: |
      system "#{bin}/cmui", "--version"
